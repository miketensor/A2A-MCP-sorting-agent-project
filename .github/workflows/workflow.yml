name: Python Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx mcp groq 
        # Add any other libraries from your .venv here
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Pytest
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # Needed if any tests aren't mocked
      run: |
        pytest -v