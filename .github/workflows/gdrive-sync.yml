name: Sync to Google Drive

on:
  push:
    branches:
      - main        # ← only stable code goes to Drive

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Authenticate and Sync
        env:
          CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          # Create the rclone config file using secrets
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          token = $REFRESH_TOKEN
          scope = drive
          EOF

          # Run the sync
          rclone sync . gdrive: \
            --drive-root-folder-id "$FOLDER_ID" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude ".venv/**" \
            --exclude "__pycache__/**" \
            --exclude "prometheus_data/**" \
            --verbose